<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-Powered Smart Volunteer Coordination Platform — Smart matching, leaderboards, real-time notifications, certificates, and analytics for NGOs and volunteers." />
    <meta name="theme-color" content="#0a0e1a" />
    <title>EcoPulse — Smart Volunteer Coordination</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!--
      Google Maps JavaScript API
      SETUP: Replace YOUR_GOOGLE_MAPS_API_KEY with a real key from:
        https://console.cloud.google.com/ → APIs & Services → Credentials
      Enable: Maps JavaScript API
    -->
    <script
      src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places"
      async
      defer
    ></script>

    <!-- Firebase Cloud Messaging meta (for PWA push support) -->
    <meta name="firebase-messaging-vapid-key" content="YOUR_VAPID_KEY" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
